apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pydbapi.fullname" . }}-prestart
  labels:
    {{- include "pydbapi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "pydbapi.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prestart
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "scripts/prestart.sh"]
          workingDir: /app/backend
          envFrom:
            - configMapRef:
                name: {{ include "pydbapi.configMapName" . }}
            - secretRef:
                name: {{ .Values.existingSecret | default (include "pydbapi.secretName" .) }}
      restartPolicy: Never
  backoffLimit: 3
