{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pydbapi.secretName" . }}
  labels:
    {{- include "pydbapi.labels" . | nindent 4 }}
type: Opaque
stringData:
  # App
  SECRET_KEY: {{ required "app.secretKey is required" .Values.app.secretKey | quote }}
  {{- if .Values.app.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.app.encryptionKey | quote }}
  {{- end }}

  # Database
  POSTGRES_USER: {{ required "database.user is required" .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ required "database.password is required" .Values.database.password | quote }}
  POSTGRES_DB: {{ required "database.db is required" .Values.database.db | quote }}

  # Redis
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}

  # Auth
  FIRST_SUPERUSER: {{ required "auth.firstSuperuser is required" .Values.auth.firstSuperuser | quote }}
  FIRST_SUPERUSER_PASSWORD: {{ required "auth.firstSuperuserPassword is required" .Values.auth.firstSuperuserPassword | quote }}
  {{- if .Values.auth.firstSuperuserEmail }}
  FIRST_SUPERUSER_EMAIL: {{ .Values.auth.firstSuperuserEmail | quote }}
  {{- end }}
{{- end }}
